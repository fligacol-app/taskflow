<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#eaf6f3" />
  <title>TaskFlow Equipa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <style>
    :root{--bg:#edf6f3;--card:#ffffff;--card2:#f8fbfa;--line:#dce9e4;--txt:#17302a;--muted:#60736d;--accent:#0ea58a;--accent2:#1796d2;--danger:#d94b4b;--warn:#ef9f1d;--ok:#2fa86d;--low:#6c8cff;--shadow:0 18px 40px rgba(20,40,35,.08)}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,sans-serif;background:linear-gradient(180deg,#f6fbf9 0%,#eef6f3 100%);color:var(--txt)}
    .wrap{min-height:100vh;display:flex;justify-content:center;padding:14px}.screen{width:100%;max-width:1080px}.glass{background:rgba(255,255,255,.78);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(12px);border-radius:28px;overflow:hidden}
    .hero{padding:22px;background:linear-gradient(135deg,rgba(14,165,138,.12),rgba(23,150,210,.08));border-bottom:1px solid var(--line)}
    .brand{display:flex;gap:14px;align-items:center}.logo{width:58px;height:58px;border-radius:18px;background:linear-gradient(135deg,#0ea58a,#1796d2);display:grid;place-items:center;color:#fff;font-size:22px;font-weight:900}.title{margin:0;font-size:26px;line-height:1.05}.sub{margin-top:6px;color:var(--muted);font-size:13px}
    .layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 28px)} .sidebar{border-right:1px solid var(--line);padding:16px;background:#f9fcfb}.main{padding:16px;display:grid;gap:14px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px}.grid{display:grid;gap:10px}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px} .three{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    input,button,select,textarea{width:100%;border:1px solid var(--line);border-radius:16px;padding:13px 15px;font:inherit;color:var(--txt);background:#fff;outline:none} input::placeholder,textarea::placeholder{color:#8ba099}
    button{background:linear-gradient(135deg,var(--accent),#12b49a);color:#fff;font-weight:800;cursor:pointer;border:none} button.secondary{background:#edf6f3;color:var(--txt);border:1px solid var(--line)} button.danger{background:linear-gradient(135deg,#ef6b6b,#d94b4b);color:#fff}
    .muted{color:var(--muted);font-size:13px}.pill{padding:8px 11px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:12px;color:var(--muted)} .hidden{display:none!important}
    .nav{display:grid;gap:8px}.nav button{min-height:54px;border-radius:16px;text-align:left;padding:12px 14px;background:#fff;color:var(--txt);border:1px solid var(--line)} .nav button.active{background:linear-gradient(135deg,rgba(14,165,138,.12),rgba(23,150,210,.08));border-color:#bfe7dc}
    .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}.statbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}.stat strong{display:block;font-size:22px}.task{padding:14px;border:1px solid var(--line);border-radius:18px;background:#fff;display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.task h4{margin:0 0 6px 0;font-size:15px}.task-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.badge{padding:7px 10px;border-radius:999px;font-size:12px;font-weight:700;border:1px solid transparent}.p-high{background:#ffe4e4;color:#b62d2d;border-color:#ffc7c7}.p-med{background:#fff4dc;color:#a56b00;border-color:#ffe0a0}.p-low{background:#e9efff;color:#3359cc;border-color:#cfdcff}.p-urgent{background:#ffe6fb;color:#a61f83;border-color:#ffc6ef}.today{background:#e8fbf5;color:#0b7c65;border-color:#b9f0dd}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.day{min-height:92px;border:1px solid var(--line);border-radius:16px;padding:10px;background:#fff}.day .d{font-weight:800}.day small{display:block;color:var(--muted);margin-top:4px}.taskmini{font-size:11px;padding:5px 7px;border-radius:10px;margin-top:6px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.taskmini.urgent{background:#ffe6fb}.taskmini.high{background:#ffe4e4}.taskmini.med{background:#fff4dc}.taskmini.low{background:#e9efff}.sectionTitle{display:flex;justify-content:space-between;align-items:center;gap:10px}.sidebar h3{margin:0 0 10px}.calendarHead{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:8px}.calendarHead div{color:var(--muted);font-size:12px;text-align:center}.mobileOnly{display:none}
    @media (max-width:900px){.layout{grid-template-columns:1fr}.sidebar{border-right:none;border-bottom:1px solid var(--line)}.statbar{grid-template-columns:repeat(2,1fr)} .three,.two{grid-template-columns:1fr} .mobileOnly{display:block} .desktopOnly{display:none}}
    @media (max-width:520px){.calendar,.calendarHead{grid-template-columns:repeat(2,1fr)} .day{min-height:auto}}
  </style>
</head>
<body>
<div class="wrap"><div class="screen glass">
  <div id="loginView">
    <div class="hero"><div class="brand"><div class="logo">TF</div><div><h1 class="title">TaskFlow Equipa</h1><div class="sub">Dashboard claro, rápido e pronto para telemóvel.</div></div></div></div>
    <div class="main">
      <div class="card" style="max-width:520px;margin:0 auto;width:100%"><div class="grid">
        <input id="email" type="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Palavra-passe" />
        <button id="loginBtn">Entrar</button>
        <div class="muted">Admin: fligadebora@hotmail.com</div>
      </div></div>
    </div>
  </div>

  <div id="appView" class="hidden">
    <div class="hero">
      <div class="top">
        <div>
          <div class="pill" id="taskflowTitle">TaskFlow</div>
          <h1 class="title" id="operatorName" style="margin-top:8px">Operador</h1>
          <div class="sub" id="operatorEmail"></div>
        </div>
        <div class="two" style="width:min(100%,320px)"><button id="logoutBtn" class="secondary">Sair</button><button id="newTaskQuickBtn">+ Nova tarefa</button></div>
      </div>
    </div>
    <div class="layout">
      <aside class="sidebar">
        <div class="card">
          <h3>Menu</h3>
          <div class="nav">
            <button id="dashBtn" class="active">Painel</button>
            <button id="tasksBtn">Tarefas</button>
            <button id="calendarBtn">Calendário</button>
            <button id="newTaskBtn">Nova tarefa</button>
            <button id="newOperatorBtn" class="hidden">Novo operador</button>
            <button id="initBtn" class="secondary">Inicializar estrutura</button>
          </div>
        </div>
        <div class="card desktopOnly" id="adminCard">
          <h3>Filtro</h3>
          <div class="grid">
            <select id="statusFilter"><option value="all">Todas</option><option value="open">Abertas</option><option value="done">Concluídas</option></select>
            <select id="sortFilter"><option value="desc">Mais recentes</option><option value="asc">Mais antigas</option></select>
          </div>
        </div>
      </aside>
      <main class="main">
        <div class="statbar">
          <div class="stat"><span class="muted">Hoje</span><strong id="sToday">0</strong></div>
          <div class="stat"><span class="muted">Abertas</span><strong id="sOpen">0</strong></div>
          <div class="stat"><span class="muted">Concluídas</span><strong id="sDone">0</strong></div>
          <div class="stat"><span class="muted">Urgentes</span><strong id="sUrgent">0</strong></div>
        </div>
        <div class="card hidden" id="operatorFormCard"><div class="grid"><input id="newOpName" placeholder="Nome do operador" /><input id="newOpEmail" type="email" placeholder="Email do operador" /><input id="newOpPassword" type="password" placeholder="Palavra-passe inicial" /><button id="createOperatorBtn">Criar operador</button></div></div>
        <div class="card hidden" id="taskFormCard"><div class="grid"><input id="taskTitle" placeholder="Título da tarefa" /><textarea id="taskDesc" rows="3" placeholder="Descrição"></textarea><div class="three"><select id="taskPriority"><option value="low">Baixa</option><option value="med" selected>Média</option><option value="high">Alta</option><option value="urgent">Urgente</option></select><input id="taskDate" type="date" /><button id="createTaskBtn">Guardar tarefa</button></div></div></div>
        <div class="card hidden" id="panelView"><div class="sectionTitle"><strong>Painel</strong><span class="muted" id="taskCount">0 tarefas</span></div><div class="grid" id="taskList" style="margin-top:12px"></div></div>
        <div class="card hidden" id="calendarView"><div class="sectionTitle"><strong>Calendário</strong><span class="muted" id="calendarMonth"></span></div><div class="calendarHead"><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div><div>Dom</div></div><div class="calendar" id="calendarGrid"></div></div>
      </main>
    </div>
  </div>
</div></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, orderBy, getDocs, doc, setDoc, updateDoc, deleteDoc, serverTimestamp, getDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
const firebaseConfig = { apiKey: "AIzaSyBQB1bMTQBZFp65xTFaeB28x23rtTdkLyk", authDomain: "taskflow-equipa.firebaseapp.com", projectId: "taskflow-equipa", storageBucket: "taskflow-equipa.firebasestorage.app", messagingSenderId: "814294944185", appId: "1:814294944185:web:e1f2b7d45311bf08c24e68" };
const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
const adminEmail='fligadebora@hotmail.com', adminPassword='fpsts2012';
const $=id=>document.getElementById(id);
const views={panel:$('panelView'),calendar:$('calendarView')};
let currentUser=null,isAdmin=false,currentScope='mine',currentEditId=null,initialized=false,tasks=[];
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function setNav(a){['dashBtn','tasksBtn','calendarBtn'].forEach(id=>$(id).classList.remove('active')); $(a).classList.add('active')}
function showApp(u){currentUser=u;isAdmin=(u.email||'').toLowerCase()===adminEmail;$('loginView').classList.add('hidden');$('appView').classList.remove('hidden');$('operatorName').textContent=u.displayName||'Operador';$('operatorEmail').textContent=u.email||'';$('taskflowTitle').textContent='TaskFlow '+(u.displayName||u.email||'Operador');$('newOperatorBtn').classList.toggle('hidden',!isAdmin);$('adminCard').classList.toggle('hidden',!isAdmin);$('initBtn').classList.toggle('hidden',initialized); showSection('panel');}
function showLogin(){ $('appView').classList.add('hidden'); $('loginView').classList.remove('hidden'); }
async function ensureBaseCollections(){ const batch=writeBatch(db); batch.set(doc(db,'operators','_init'),{init:true,systemBase:true,createdAt:serverTimestamp()},{merge:true}); batch.set(doc(db,'tasks','_init'),{init:true,systemBase:true,createdAt:serverTimestamp()},{merge:true}); await batch.commit(); await deleteDoc(doc(db,'operators','_init')); await deleteDoc(doc(db,'tasks','_init')); initialized=true; $('initBtn').classList.add('hidden'); }
function priorityClass(p){return ({low:'p-low',med:'p-med',high:'p-high',urgent:'p-urgent'}[p]||'p-med')}
function renderStats(){const open=tasks.filter(t=>!t.done),done=tasks.filter(t=>t.done),urgent=tasks.filter(t=>t.priority==='urgent').length,today=new Date().toISOString().slice(0,10);$('sToday').textContent=tasks.filter(t=>String(t.taskDate||'').slice(0,10)===today).length;$('sOpen').textContent=open.length;$('sDone').textContent=done.length;$('sUrgent').textContent=urgent;}
function renderTasks(){ const status=$('statusFilter').value, sort=$('sortFilter').value; let items=[...tasks]; if(status==='open') items=items.filter(t=>!t.done); if(status==='done') items=items.filter(t=>t.done); items.sort((a,b)=>sort==='asc'?(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0):(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)); $('taskCount').textContent=items.length+' tarefas'; $('taskList').innerHTML=items.length?items.map(t=>`<div class="task"><div><h4>${esc(t.title)}</h4><div class="muted">${esc(t.desc||'')}</div><div style="margin-top:8px"><span class="badge ${priorityClass(t.priority)}">${t.priority==='urgent'?'Urgente':t.priority==='high'?'Alta':t.priority==='med'?'Média':'Baixa'}</span> <span class="pill" style="margin-left:6px">${t.done?'Concluída':'Em aberto'}</span>${t.taskDate?` <span class="pill" style="margin-left:6px">${esc(t.taskDate)}</span>`:''}</div></div><div class="task-actions"><button class="secondary" data-edit="${t.id}">Editar</button><button class="secondary" data-toggle="${t.id}">${t.done?'Reabrir':'Concluir'}</button>${isAdmin?`<button class="danger" data-del="${t.id}">Apagar</button>`:''}</div></div>`).join(''):'<div class="muted">Sem tarefas.</div>'; document.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=()=>toggleTask(b.dataset.toggle)); document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>editTask(b.dataset.edit)); document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>removeTask(b.dataset.del)); renderStats(); }
function renderCalendar(){ const grid=$('calendarGrid'); const now=new Date(); const y=now.getFullYear(),m=now.getMonth(); $('calendarMonth').textContent=now.toLocaleDateString('pt-PT',{month:'long',year:'numeric'}); const first=new Date(y,m,1), start=(first.getDay()+6)%7, days=new Date(y,m+1,0).getDate(); const cells=[]; for(let i=0;i<start;i++) cells.push('<div class="day" style="background:transparent;border-style:dashed"></div>'); for(let d=1;d<=days;d++){ const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; const dayTasks=tasks.filter(t=>String(t.taskDate||'').slice(0,10)===ds); cells.push(`<div class="day ${ds===new Date().toISOString().slice(0,10)?'today':''}"><div class="d">${d}</div>${dayTasks.slice(0,3).map(t=>`<span class="taskmini ${t.priority==='urgent'?'urgent':t.priority==='high'?'high':t.priority==='med'?'med':'low'}">${esc(t.title)}</span>`).join('')}${dayTasks.length>3?`<small>+${dayTasks.length-3} mais</small>`:''}</div>`);} grid.innerHTML=cells.join(''); }
async function loadTasks(scope='mine'){ currentScope=scope; const qref=scope==='all'&&isAdmin?query(collection(db,'tasks'),orderBy('createdAt','desc')):query(collection(db,'tasks'),where('uid','==',currentUser.uid),orderBy('createdAt','desc')); const snap=await getDocs(qref); tasks=snap.docs.map(d=>({id:d.id,...d.data()})); renderTasks(); renderCalendar(); }
async function toggleTask(id){ const ref=doc(db,'tasks',id), snap=await getDoc(ref); if(!snap.exists()||snap.data().systemBase) return; await updateDoc(ref,{done:!snap.data().done,updatedAt:serverTimestamp()}); loadTasks(currentScope); }
async function editTask(id){ const snap=await getDoc(doc(db,'tasks',id)); if(!snap.exists()||snap.data().systemBase) return; const t=snap.data(); currentEditId=id; $('taskFormCard').classList.remove('hidden'); $('taskTitle').value=t.title||''; $('taskDesc').value=t.desc||''; $('taskPriority').value=t.priority||'med'; $('taskDate').value=(t.taskDate||'').slice(0,10); $('createTaskBtn').textContent='Atualizar tarefa'; showSection('panel'); }
async function removeTask(id){ const snap=await getDoc(doc(db,'tasks',id)); if(!snap.exists()||snap.data().systemBase) return alert('Documento-base protegido.'); if(!confirm('Apagar esta tarefa?')) return; await deleteDoc(doc(db,'tasks',id)); loadTasks(currentScope); }
function showSection(which){ Object.values(views).forEach(v=>v.classList.add('hidden')); views[which].classList.remove('hidden'); setNav(which==='panel'?'dashBtn':which==='calendar'?'calendarBtn':'tasksBtn'); }
$('loginBtn').onclick=async()=>{ try{ const em=$('email').value.trim(),pw=$('password').value.trim(); if(em.toLowerCase()===adminEmail&&pw===adminPassword){ try{ await signInWithEmailAndPassword(auth,em,pw);}catch{ const cred=await createUserWithEmailAndPassword(auth,em,pw); await updateProfile(cred.user,{displayName:'Admin'});} return; } await signInWithEmailAndPassword(auth,em,pw); }catch(e){ alert(e.message); } };
$('logoutBtn').onclick=()=>signOut(auth);
$('initBtn').onclick=async()=>{ try{ await ensureBaseCollections(); }catch(e){ alert(e.message); } };
$('newTaskBtn').onclick=$('newTaskQuickBtn').onclick=()=>{ $('taskFormCard').classList.toggle('hidden'); $('operatorFormCard').classList.add('hidden'); showSection('panel'); };
$('newOperatorBtn').onclick=()=>{ if(!isAdmin) return alert('Apenas admin.'); $('operatorFormCard').classList.toggle('hidden'); $('taskFormCard').classList.add('hidden'); showSection('panel'); };
$('dashBtn').onclick=()=>showSection('panel'); $('tasksBtn').onclick=()=>showSection('panel'); $('calendarBtn').onclick=()=>showSection('calendar'); $('statusFilter').onchange=()=>renderTasks(); $('sortFilter').onchange=()=>renderTasks();
$('createTaskBtn').onclick=async()=>{ const title=$('taskTitle').value.trim(),desc=$('taskDesc').value.trim(); if(!title) return alert('Escreva um título.'); if(currentEditId){ await updateDoc(doc(db,'tasks',currentEditId),{title,desc,priority:$('taskPriority').value,taskDate:$('taskDate').value||null,updatedAt:serverTimestamp()}); currentEditId=null; $('createTaskBtn').textContent='Guardar tarefa'; } else { await addDoc(collection(db,'tasks'),{title,desc,priority:$('taskPriority').value,taskDate:$('taskDate').value||null,uid:currentUser.uid,email:currentUser.email,name:currentUser.displayName||currentUser.email,done:false,createdAt:serverTimestamp(),updatedAt:serverTimestamp()}); } $('taskTitle').value=''; $('taskDesc').value=''; $('taskDate').value=''; $('taskFormCard').classList.add('hidden'); loadTasks(currentScope); };
$('createOperatorBtn').onclick=async()=>{ if(!isAdmin) return alert('Apenas admin.'); const name=$('newOpName').value.trim(),email=$('newOpEmail').value.trim(),password=$('newOpPassword').value.trim(); if(!name||!email||!password) return alert('Preencha todos os campos.'); const cred=await createUserWithEmailAndPassword(auth,email,password); await updateProfile(cred.user,{displayName:name}); await setDoc(doc(db,'operators',cred.user.uid),{name,email,active:true,createdAt:serverTimestamp(),createdBy:adminEmail}); $('newOpName').value='';$('newOpEmail').value='';$('newOpPassword').value=''; alert('Operador criado.'); };
onAuthStateChanged(auth,async user=>{ if(user){ showApp(user); await loadTasks('mine'); } else showLogin(); });
</script>
</body>
</html>
